<DOCTYPE html>
<html>
    <head>
        <style>
            @font-face {
                font-family: cmu;
                src: url(https://rng.alex-seltzer.com/cmu.ttf);
            }
            * {
                font-family: cmu;
                box-sizing: border-box;
            }
            body {
                background-color: powderblue;
            }
            div {
                overflow: auto;
            }
            button, select {
                transition: all 100ms linear;
                background-color: white;
            }
            select {
                border: 1px solid #777;
                border-radius: 5px;
            }
            button:hover:not(:disabled), select:hover:not(:disabled) {
                background-color: #dddddd;
                border-radius: 5px;
            }
            button:disabled, select:disabled {
                background-color: #bbb;
                color: #666;
            }
            button:active:not(:disabled):not(.noHoverEffect), select:active {
                background-color: #cccccc;
            }
            #bigContainer {
                position: absolute;
                left: 0;
                top: 0;
                width: calc(100vw - 50px);
                height: calc(100vh - 50px);
                margin: 25px;
                background-color: rgba(255, 255, 255, 0.5);
                border-radius: 15px;
                border: 1px solid #666;
                box-shadow: 0px 0px 10px #0003;
                padding: 8px;
                display: flex;
            }
            #bigContainer > * {
                width: 100%;
                height: calc(100% - 30px);
                padding: 15px;
                border: 1px solid #666;
                margin: 7px;
                border-radius: 10px;
                background-color: white;
                box-shadow: 0px 0px 10px #0001;
            }
            #inputContainer > * {
                width: 100%;
                height: calc(25% - 20px);
                padding: 15px;
                margin-bottom: 20px;
                border: 1px solid #777;
                border-radius: 10px;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
            #inputContainer > * > * {
                width: 50%;
                margin-left: 25%;
                margin-right: 25%;
                align-self: center;
                text-align: center;
                margin-top: 0;
            }
            input[type=text] {
                padding: 5px;
                border-radius: 5px;
                border: 1px solid #777;
                text-align: center;
            }
            #resultContainer {
                display: flex;
                align-items: center;
            }
            #result {
                width: 100%;
                margin: 0;
                text-align: center;
            }
            #result > p {
                border: 1px solid rgba(0, 0, 0, 0.2);
                border-radius: 15px;
                padding: 4px;
                margin: 4px;
            }
            #otherControlContainer {
                display: flex;
                flex-direction: row;
            }
            #otherControlContainer > * {
                width: 100%;
                margin: 0;
            }
            #minMaxContainer {
                display: flex;
                flex-direction: row;
                border: 0;
                padding: 0;
            }
            #minMaxContainer > *:not(#separator) {
                width: 100%;
                height: calc(100% - 0px);
                margin: 0;
                border: 1px solid #777;
                display: flex;
                flex-direction: column;
                justify-content: center;
                padding: 10px;
                border-radius: 10px;
            }
            #separator {
                max-width: 1;
            }
            #minInputContainer {
                margin-right: 20px !important;
            }
            #otherControlContainer {
                overflow: hidden !important;
            }
        </style>
        <script src="/jquery.js"></script>
    </head>
    <body>
        <div id="bigContainer">
            <div id="inputContainer">
                <div id="distChoiceContainer">
                    <p>Distribution Method</p>
                    <select id="distChoice" autocomplete="off">
                        <option value="uniform">Uniform</option>
                        <option value="normal">Gaussian Normal</option>
                    </select>
                </div>
                <div id="otherControlContainer">
                    <div id="uniformControls">
                        <div class="inputEl uniformEl">
                            <p>Integer Only</p>
                            <input type="checkbox" id="floatOrNo" name="floatOrNo" checked autocomplete="off">
                        </div>
                        <div>
                            <p>Number of Numbers: <span id="numNumbersSpan">1</span></p>
                            <input type="range" min="1" max="20" value="1" id="numNumbers" autocomplete="off">
                        </div>
                    </div>
                    <div>
                        <div class="inputEl uniformEl normalEl">
                            <p>Decimal Digits: <span id="decimalLabel">5</span></p>
                            <input type="range" min="0" max="16" value="5" id="numDigitsInput" disabled="disabled" autocomplete="off">
                        </div>
                        <div>
                            <p>Show Summary</p>
                            <input type="checkbox" id="showSummaryCheck">
                        </div>
                    </div>
                </div>
                <div id="minMaxContainer">
                    <div id="minInputContainer" class="inputEl uniformEl">
                        <h2>Minimum Value</h2>
                        <input id="minInput" type="text" value="1" autocomplete="off">
                    </div>
                    <div id="maxInputContainer" class="inputEl uniformEl">
                        <h2>Maximum Value</h2>
                        <input id="maxInput" type="text" value="20" autocomplete="off">
                    </div>
                    <div class="inputEl normalEl" style="display: none;margin-right: 15px;">
                        <h2>Mean</h2>
                        <input type="text" value="0" id="normalMean">
                    </div>
                    <div class="inputEl normalEl" style="display: none;">
                        <h2>Standard Deviation</h2>
                        <input type="text" value="1" id="normalSigma">
                    </div>
                </div>
                <button id="go">
                    Generate
                </button>
            </div>
            <div id="resultContainer">
                <h1 id="result">0</h1>
            </div>
        </div>
    </body>
    <script>
        let r = RegExp(/[^(\d|\.)]/, "g");
        var results = [];

        function gaussianRandom() { // Returns a random Gaussian-distributed number using the Box-Muller transform
            return Number($("#normalMean").val().replaceAll(r, "")) + (Number($("#normalSigma").val().replaceAll(r, "")) * Math.sqrt(-2 * Math.log(Math.random())) * Math.cos(2 * Math.PI * Math.random()));
        }
        function uniformRandom() {
            let min = Number(document.getElementById("minInput").value.replaceAll(r, ""));
            let max = Number(document.getElementById("maxInput").value.replaceAll(r, ""));

            return min + Math.random() * (max - min);
        }

        function cRandom() { // Returns random number using current generation method
            if($("#distChoice").find(":selected").val() == "uniform") {
                return uniformRandom();
            } else if($("#distChoice").find(":selected").val() == "normal") {
                return gaussianRandom();
            }
        }

        function refreshResult() {
            var toPush = "";

            var newline = false;
            var numAdded = 0;

            var tresults = [];
            var max = -Infinity;
            var min = Infinity;

            results.forEach((tresult) => {
                if(numAdded >= Number(document.getElementById("numNumbers").value)) return;

                if($("#distChoice").find(":selected").val() == "uniform") {
                    if(document.getElementById("floatOrNo").checked) {
                        tresult = (Math.round(tresult));
                    } else {
                        tresult = Number(tresult.toFixed(Number(document.getElementById("numDigitsInput").value)));
                    }
                } else if($("#distChoice").find(":selected").val() == "normal") {
                    tresult = Number(tresult.toFixed(Number(document.getElementById("numDigitsInput").value)));
                }

                tresults.push(tresult);
                if(tresult > max) max = tresult;
                if(tresult < min) min = tresult;

                if(document.getElementById("floatOrNo").checked) {
                    toPush += `<p style="display: inline-block;min-width: 20%;">${tresult}</p>`;
                } else {
                    toPush += `<p style="min-width: 20%;margin: auto;display: inline-block;margin: 10px;">${tresult}</p>`;
                }

                numAdded++;
            });

            if(document.getElementById("showSummaryCheck").checked && Number(document.getElementById("numNumbers").value) > 1) {
                toPush += "<hr>";
                toPush += `<p style="min-width: 20%;margin: auto;display: inline-block;margin: 10px;">Sum: ${tresults.reduce((ps, ta) => ps + ta, 0)}</p><br>`;
                toPush += `<p style="min-width: 20%;margin: auto;display: inline-block;margin: 10px;">Mean: ${(tresults.reduce((ps, ta) => ps + ta, 0)/tresults.length)}</p><br>`;
                toPush += `<p style="min-width: 20%;margin: auto;display: inline-block;margin: 10px;">Max: ${max}</p><br>`;
                toPush += `<p style="min-width: 20%;margin: auto;display: inline-block;margin: 10px;">Min: ${min}</p><br>`;
            }
            
            document.getElementById("result").innerHTML = toPush;
        }

        window.onload = function() {
            document.getElementById("floatOrNo").addEventListener("click", function() {
                document.getElementById("numDigitsInput").disabled = this.checked;
                refreshResult();
            });

            document.getElementById("showSummaryCheck").addEventListener("click", function() {
                refreshResult();
            });

            document.getElementById("numDigitsInput").addEventListener("input", function() {
                $("#decimalLabel").text($("#numDigitsInput").val());
                refreshResult();
            });

            $("#distChoice").on("change", function() {
                console.log($("#distChoice").find(":selected").val());

                $(".inputEl").css("display", "none");
                $(`.${$("#distChoice").find(":selected").val()}El`).css("display", "");

                if($("#distChoice").find(":selected").val() == "normal") {
                    document.getElementById("numDigitsInput").disabled = false;
                } else if($("#distChoice").find(":selected").val() == "uniform") {
                    document.getElementById("numDigitsInput").disabled = $("#floatOrNo").prop("checked");
                }

                $("#go").click();
                refreshResult();
            })

            document.getElementById("numNumbers").addEventListener("input", function() {
                if(Number(document.getElementById("numNumbers").value) == 1) {
                    document.getElementById("showSummaryCheck").disabled = true;
                } else {
                    document.getElementById("showSummaryCheck").disabled = false;
                }
                $("#numNumbersSpan").text($("#numNumbers").val());
                refreshResult();
            });

            let numberfied = Number(window.location.pathname.substring(1).replaceAll(r, ""));
            if(window.location.pathname.substring(1).replaceAll(r, "").length && !isNaN(numberfied)) {
                console.log(numberfied);
                document.getElementById("maxInput").value = numberfied;

                if(window.location.pathname.includes(".")) {
                    document.getElementById("floatOrNo").checked = false;
                    document.getElementById("numDigitsInput").disabled = false;
                }
                if(numberfied % 1 > 0.0001) {
                    document.getElementById("floatOrNo").checked = false;
                    document.getElementById("numDigitsInput").disabled = false;
                }
            }

            document.getElementById("go").addEventListener("click", function() {
                if(isNaN(Number(document.getElementById("minInput").value.replaceAll(r, "")))) {
                    document.getElementById("minInput").value = "1";
                }
                if(isNaN(Number(document.getElementById("maxInput").value.replaceAll(r, "")))) {
                    document.getElementById("maxInput").value = "20";
                }

                results = [];

                for(var i = 0; i < 20; i++) {
                    let tresult = cRandom();

                    results.push(tresult);
                }
                
                refreshResult();

                document.getElementById("maxInput").value = document.getElementById("maxInput").value.replaceAll(r, "");
                document.getElementById("minInput").value = document.getElementById("minInput").value.replaceAll(r, "");
            });

            document.getElementById("go").click();
        }
    </script>
</html>
